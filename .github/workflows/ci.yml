name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    uses: eirvandelden/appkit/.github/workflows/rails-ci.yml@main
    with:
      run_system_tests: true

  i18n:
    name: i18n normalized
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true
      - run: bundle exec ruby ./bin/check_i18n_normalized
